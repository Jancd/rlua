name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust test
        run: cargo test --workspace
